services:
  - type: web
    name: error404-backend
    runtime: node
    plan: standard
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        scope: project
        sync: false
      - key: JWT_SECRET
        scope: project
        sync: false
      - key: JUDGE0_API_URL
        value: https://ce.judge0.com
      - key: ALLOWED_ORIGINS
        value: https://YOUR_VERCEL_DOMAIN
