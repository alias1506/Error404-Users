name: Backend Keepalive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend health endpoint
        env:
          BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then
            echo "Missing RENDER_BACKEND_URL secret"
            exit 1
          fi

          curl -fsS "$BACKEND_URL/api/health" > /dev/null
